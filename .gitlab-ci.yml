stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  BACKEND_IMAGE: "$HARBOR_REGISTRY/$HARBOR_PROJECT/backend:$CI_COMMIT_SHORT_SHA"
  FRONTEND_IMAGE: "$HARBOR_REGISTRY/$HARBOR_PROJECT/frontend:$CI_COMMIT_SHORT_SHA"

.docker-build-template:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login "$HARBOR_REGISTRY" -u "$HARBOR_USERNAME" -p "$HARBOR_PASSWORD"

build_backend:
  extends: .docker-build-template
  script:
    - docker build -t "$BACKEND_IMAGE" -f demo/Dockerfile demo
    - docker push "$BACKEND_IMAGE"
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$BACKEND_IMAGE" "$HARBOR_REGISTRY/$HARBOR_PROJECT/backend:latest"
        docker push "$HARBOR_REGISTRY/$HARBOR_PROJECT/backend:latest"
      fi

build_frontend:
  extends: .docker-build-template
  script:
    - >
      docker build
      --build-arg VITE_API_BASE_URL="$VITE_API_BASE_URL"
      --build-arg VITE_WS_BASE_URL="$VITE_WS_BASE_URL"
      -t "$FRONTEND_IMAGE"
      -f frontend/Dockerfile
      frontend
    - docker push "$FRONTEND_IMAGE"
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$FRONTEND_IMAGE" "$HARBOR_REGISTRY/$HARBOR_PROJECT/frontend:latest"
        docker push "$HARBOR_REGISTRY/$HARBOR_PROJECT/frontend:latest"
      fi

deploy_ec2:
  stage: deploy
  image: alpine:3.20
  needs:
    - build_backend
    - build_frontend
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$EC2_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
  script:
    - ssh "$EC2_USER@$EC2_HOST" "mkdir -p $EC2_DEPLOY_PATH"
    - scp docker-compose.prod.yml "$EC2_USER@$EC2_HOST:$EC2_DEPLOY_PATH/docker-compose.prod.yml"
    - |
      ssh "$EC2_USER@$EC2_HOST" "cat > $EC2_DEPLOY_PATH/.env.prod <<EOF
      BACKEND_IMAGE=$BACKEND_IMAGE
      FRONTEND_IMAGE=$FRONTEND_IMAGE
      FRONTEND_PUBLISHED_PORT=${FRONTEND_PUBLISHED_PORT:-80}
      BACKEND_PUBLISHED_PORT=${BACKEND_PUBLISHED_PORT:-8080}
      DB_PUBLISHED_PORT=${DB_PUBLISHED_PORT:-3307}
      MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
      MYSQL_DATABASE=${MYSQL_DATABASE:-elibrary}
      MYSQL_USER=${MYSQL_USER:-elibrary}
      MYSQL_PASSWORD=$MYSQL_PASSWORD
      DB_APP_USERNAME=${DB_APP_USERNAME:-root}
      DB_APP_PASSWORD=$DB_APP_PASSWORD
      SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_FLYWAY_ENABLED=${SPRING_FLYWAY_ENABLED:-false}
      SPRING_MAIL_HOST=$SPRING_MAIL_HOST
      SPRING_MAIL_PORT=${SPRING_MAIL_PORT:-2525}
      SPRING_MAIL_USERNAME=$SPRING_MAIL_USERNAME
      SPRING_MAIL_PASSWORD=$SPRING_MAIL_PASSWORD
      SPRING_MAIL_SMTP_AUTH=${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      SPRING_MAIL_SMTP_STARTTLS_REQUIRED=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:-true}
      APP_NOTIFICATION_EMAIL_ENABLED=${APP_NOTIFICATION_EMAIL_ENABLED:-true}
      APP_NOTIFICATION_FRONTEND_BASE_URL=$APP_NOTIFICATION_FRONTEND_BASE_URL
      APP_JWT_SECRET_KEY=$APP_JWT_SECRET_KEY
      APP_JWT_EXPIRATION_MS=${APP_JWT_EXPIRATION_MS:-86400000}
      EOF"
    - |
      ssh "$EC2_USER@$EC2_HOST" "
        docker login $HARBOR_REGISTRY -u $HARBOR_USERNAME -p $HARBOR_PASSWORD &&
        cd $EC2_DEPLOY_PATH &&
        docker compose --env-file .env.prod -f docker-compose.prod.yml pull &&
        docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'