server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the Vite build output and fall back to index.html for SPA routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container so the browser stays on one origin.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cache hashed static assets aggressively in production.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Avoid caching the HTML shell so fresh deployments show up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
