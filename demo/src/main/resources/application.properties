spring.application.name=demo

server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/elibrary?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}

jwt.secret-key=${APP_JWT_SECRET_KEY:TXlTdXBlclNlY3JldEtleUZvckpXVFNpZ25pbmdGb3JFbGlicmFyeTIwMjY=}
jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

app.notification.email-enabled=${APP_NOTIFICATION_EMAIL_ENABLED:false}
app.notification.email-from=${APP_NOTIFICATION_EMAIL_FROM:}

app.renewal.max-renewals=${APP_RENEWAL_MAX_RENEWALS:2}
app.renewal.window-days=${APP_RENEWAL_WINDOW_DAYS:3}
app.renewal.extension-days=${APP_RENEWAL_EXTENSION_DAYS:7}

app.overdue.daily-fine=${APP_OVERDUE_DAILY_FINE:5000}
app.overdue.lock-days-threshold=${APP_OVERDUE_LOCK_DAYS_THRESHOLD:7}
app.overdue.lock-fine-threshold=${APP_OVERDUE_LOCK_FINE_THRESHOLD:50000}
