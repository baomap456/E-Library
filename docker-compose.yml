services:
  db:
    image: mysql:8.4
    container_name: elibrary-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: elibrary
      MYSQL_USER: elibrary
      MYSQL_PASSWORD: elibrary123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./demo
      dockerfile: Dockerfile
    container_name: elibrary-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/elibrary?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: "false"
      APP_JWT_SECRET_KEY: TXlTdXBlclNlY3JldEtleUZvckpXVFNpZ25pbmdGb3JFbGlicmFyeTIwMjY=
      APP_JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"

volumes:
  mysql_data:
